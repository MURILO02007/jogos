<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Snake 3.0</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #020617, #020617);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
    }

    .game-container {
      text-align: center;
      position: relative;
    }

    canvas {
      background: #020617;
      border-radius: 12px;
      border: 3px solid #22c55e;
      display: block;
    }

    h1 {
      margin-bottom: 6px;
    }

    p {
      margin: 4px 0;
    }

    .button-container {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      background: #22c55e;
      color: #020617;
      border: none;
      padding: 10px 25px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      background: #4ade80;
      transform: scale(1.05);
      box-shadow: 0 0 15px #22c55e;
    }

    button:disabled {
      background: #4b5563;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      opacity: 0.5;
    }

    .game-over-message {
      color: #ef4444;
      font-size: 18px;
      font-weight: bold;
      margin-top: 10px;
      text-shadow: 0 0 10px #ef4444;
    }
  </style>
</head>
<body>

  <div class="game-container">
    <h1>🐍 Snake 3.0</h1>
    <p>Pontuação: <span id="score">0</span></p>
    <p>Espaço = Pausar | Setas = Mover</p>
    <canvas id="game" width="400" height="400"></canvas>
    
    <div class="button-container">
      <button id="startBtn" class="start-btn">Iniciar Jogo</button>
      <button id="restartBtn" class="restart-btn" disabled>Reiniciar</button>
    </div>
    
    <div id="gameOverMessage" class="game-over-message" style="display: none;"></div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const gameOverMessage = document.getElementById("gameOverMessage");

    const box = 16;
    const gridSize = canvas.width / box;

    let score = 0;
    let speed = 90;
    let paused = false;
    let gameStarted = false;
    let game = null;

    let snake = [{ x: 10, y: 10 }];
    let direction = "RIGHT";
    let food = null;

    let foodScale = 1;
    let growFood = true;

    document.addEventListener("keydown", handleKey);
    startBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", restartGame);

    function handleKey(e) {
      if (!gameStarted) return;
      
      if (e.key === " ") {
        e.preventDefault();
        paused = !paused;
      }
      
      if (e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
      if (e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
      if (e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
      if (e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
    }

    function spawnFood() {
      return {
        x: Math.floor(Math.random() * gridSize),
        y: Math.floor(Math.random() * gridSize)
      };
    }

    function drawGrid() {
      ctx.strokeStyle = "rgba(255,255,255,0.03)";
      for (let i = 0; i < canvas.width; i += box) {
        ctx.beginPath();
        ctx.moveTo(i, 0);
        ctx.lineTo(i, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i);
        ctx.lineTo(canvas.width, i);
        ctx.stroke();
      }
    }

    function drawSnake() {
      ctx.shadowColor = "rgba(0,0,0,0.5)";
      ctx.shadowBlur = 6;

      snake.forEach((part, index) => {
        ctx.fillStyle = index === 0 ? "#4ade80" : "#22c55e";
        ctx.beginPath();
        ctx.roundRect(
          part.x * box,
          part.y * box,
          box,
          box,
          6
        );
        ctx.fill();

        if (index === 0) {
          ctx.fillStyle = "#000";
          ctx.beginPath();
          ctx.arc(part.x * box + 5, part.y * box + 5, 2, 0, Math.PI * 2);
          ctx.arc(part.x * box + 11, part.y * box + 5, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      ctx.shadowBlur = 0;
    }

    function drawFood() {
      if (!food) return;
      
      if (growFood) foodScale += 0.02;
      else foodScale -= 0.02;

      if (foodScale > 1.2) growFood = false;
      if (foodScale < 1) growFood = true;

      ctx.fillStyle = "#ef4444";
      ctx.beginPath();
      ctx.arc(
        food.x * box + box / 2,
        food.y * box + box / 2,
        (box / 2) * foodScale,
        0,
        Math.PI * 2
      );
      ctx.fill();
    }

    function collision(head, body) {
      return body.some(part => part.x === head.x && part.y === head.y);
    }

    function gameOver() {
      if (game) {
        clearInterval(game);
        game = null;
      }
      
      gameStarted = false;
      gameOverMessage.style.display = "block";
      gameOverMessage.textContent = `💀 Game Over! Pontuação: ${score}`;
      
      startBtn.disabled = true;
      restartBtn.disabled = false;
      
      drawGame();
    }

    function drawGame() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      if (food) drawFood();
      drawSnake();
    }

    function update() {
      if (paused || !gameStarted) return;

      let head = { ...snake[0] };

      if (direction === "LEFT") head.x--;
      if (direction === "UP") head.y--;
      if (direction === "RIGHT") head.x++;
      if (direction === "DOWN") head.y++;

      if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= gridSize ||
        head.y >= gridSize
      ) {
        gameOver();
        return;
      }

      if (collision(head, snake)) {
        gameOver();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.innerText = score;
        food = spawnFood();

        if (speed > 55) {
          speed -= 3;
          if (game) {
            clearInterval(game);
            game = setInterval(loop, speed);
          }
        }
      } else {
        snake.pop();
      }
    }

    function loop() {
      if (!gameStarted) return;
      update();
      drawGame();
    }

    function startGame() {
      // Reset game state
      score = 0;
      speed = 90;
      snake = [{ x: 10, y: 10 }];
      direction = "RIGHT";
      food = spawnFood();
      paused = false;
      gameStarted = true;
      
      scoreEl.innerText = score;
      gameOverMessage.style.display = "none";
      
      startBtn.disabled = true;
      restartBtn.disabled = false;
      
      if (game) {
        clearInterval(game);
      }
      game = setInterval(loop, speed);
    }

    function restartGame() {
      startGame();
    }

    function resetGame() {
      score = 0;
      speed = 90;
      snake = [{ x: 10, y: 10 }];
      direction = "RIGHT";
      food = spawnFood();
      paused = false;
      
      scoreEl.innerText = score;
      gameOverMessage.style.display = "none";
      
      drawGame();
    }

    // Initial draw without starting the game
    food = spawnFood();
    drawGame();

    // Canvas roundRect helper
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      return this;
    };
  </script>

</body>
</html>
