<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FPS Aim Trainer 2.0 - Menu</title>

<style>
  body {
    margin: 0;
    background: #020617;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Arial', sans-serif;
    color: white;
  }

  canvas {
    border: 3px solid #22c55e;
    image-rendering: pixelated;
    cursor: none;
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
  }

  .hud {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.5);
    padding: 10px 20px;
    border-radius: 10px;
    border-left: 4px solid #22c55e;
    z-index: 10;
  }

  .hud span {
    color: #22c55e;
    font-size: 32px;
  }
  
  .timer-hud {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    background: rgba(0,0,0,0.5);
    padding: 10px 20px;
    border-radius: 10px;
    border-left: 4px solid #f59e0b;
    z-index: 10;
    display: none;
  }
  
  .timer-hud span {
    color: #f59e0b;
    font-size: 32px;
  }
  
  .menu-button {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    border: 2px solid #22c55e;
    color: white;
    font-size: 18px;
    font-weight: bold;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s;
  }
  
  .menu-button:hover {
    background: #22c55e;
    transform: scale(1.05);
  }
  
  .menu-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(2, 6, 23, 0.8);
    z-index: 20;
  }
  
  .menu-container {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    padding: 40px;
    border-radius: 20px;
    border: 3px solid #22c55e;
    box-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
    text-align: center;
    max-width: 500px;
  }
  
  .menu-container h1 {
    font-size: 48px;
    margin-bottom: 20px;
    color: #22c55e;
    text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
  }
  
  .menu-container h2 {
    font-size: 24px;
    margin-bottom: 30px;
    color: #fff;
  }
  
  .menu-buttons {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .menu-btn {
    background: #334155;
    border: 2px solid #22c55e;
    color: white;
    font-size: 24px;
    font-weight: bold;
    padding: 15px 30px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s;
  }
  
  .menu-btn:hover {
    background: #22c55e;
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
  }
  
  .menu-btn.small {
    font-size: 18px;
    padding: 10px 20px;
  }
  
  .game-over-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(2, 6, 23, 0.9);
    z-index: 30;
  }
  
  .game-over-container {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    padding: 40px;
    border-radius: 20px;
    border: 3px solid #f59e0b;
    box-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
    text-align: center;
    max-width: 400px;
  }
  
  .game-over-container h1 {
    font-size: 48px;
    margin-bottom: 20px;
    color: #f59e0b;
  }
  
  .final-score {
    font-size: 64px;
    font-weight: bold;
    color: #22c55e;
    margin: 20px 0;
  }
</style>
</head>
<body>

<div class="hud">🎯 PONTOS: <span id="score">0</span></div>
<div class="timer-hud" id="timerHud">⏱️ <span id="timer">30</span>s</div>
<button class="menu-button" id="menuButton" onclick="backToMenu()" style="display: none;">🏠 VOLTAR AO MENU</button>

<div class="menu-overlay" id="menuOverlay">
  <div class="menu-container">
    <h1>🎯 AIM TRAINER</h1>
    <h2>ESCOLHA O MODO DE JOGO</h2>
    <div class="menu-buttons">
      <button class="menu-btn" onclick="startGame('infinito')">TIROTEIO INFINITO</button>
      <button class="menu-btn" onclick="startGame('rapido')">QUEM ATIRA MAIS RÁPIDO</button>
    </div>
    <div style="color: #94a3b8; font-size: 14px; margin-top: 20px;">
      Modo infinito: atire nos alvos e acumule pontos<br>
      Modo rápido: 30 segundos para fazer o máximo de pontos
    </div>
  </div>
</div>

<div class="game-over-overlay" id="gameOverOverlay">
  <div class="game-over-container">
    <h1>⏰ FIM DE JOGO!</h1>
    <h2>SUA PONTUAÇÃO:</h2>
    <div class="final-score" id="finalScore">0</div>
    <div class="menu-buttons">
      <button class="menu-btn small" onclick="restartGame()">JOGAR NOVAMENTE</button>
      <button class="menu-btn small" onclick="backToMenu()">VOLTAR AO MENU</button>
    </div>
  </div>
</div>

<canvas id="game" width="960" height="540"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");
const timerHud = document.getElementById("timerHud");
const menuOverlay = document.getElementById("menuOverlay");
const gameOverOverlay = document.getElementById("gameOverOverlay");
const finalScoreEl = document.getElementById("finalScore");
const menuButton = document.getElementById("menuButton");

let mouseX = canvas.width / 2;
let mouseY = canvas.height / 2;
let score = 0;

// ========================
// ESTADO DO JOGO
// ========================
let gameMode = null; // 'infinito' ou 'rapido'
let gameActive = false;
let gameTime = 30;
let gameTimer = null;

// ========================
// ANIMAÇÃO DE TIRO (SOMENTE VISUAL)
// ========================
let shooting = false;
let shootFrame = 0;

// ========================
// ALVOS
// ========================
let targets = [];

function spawnTarget() {
  return {
    x: Math.random() * (canvas.width - 200) + 100,
    y: Math.random() * 200 + 120,
    r: 22
  };
}

// ========================
// MOUSE
// ========================
canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

// ========================
// TIRO INSTANTÂNEO - OTIMIZADO
// ========================
canvas.addEventListener("click", (e) => {
  e.preventDefault();
  if (!gameActive) return;
  
  // Ativa animação de tiro (apenas visual)
  shooting = true;
  shootFrame = 0;
  
  // Verifica acertos instantaneamente - SEM ATRASO
  for (let i = targets.length - 1; i >= 0; i--) {
    const target = targets[i];
    const dx = mouseX - target.x;
    const dy = mouseY - target.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < target.r) {
      score++;
      scoreEl.innerText = score;
      
      // Reposiciona o alvo instantaneamente
      const newTarget = spawnTarget();
      target.x = newTarget.x;
      target.y = newTarget.y;
      
      break; // Só acerta um alvo por clique
    }
  }
});

// ========================
// FUNÇÕES DO MENU
// ========================
function startGame(mode) {
  gameMode = mode;
  gameActive = true;
  score = 0;
  scoreEl.innerText = score;
  menuOverlay.style.display = 'none';
  menuButton.style.display = 'block';
  
  // Reset targets
  targets = [];
  for (let i = 0; i < 4; i++) {
    targets.push(spawnTarget());
  }
  
  if (mode === 'rapido') {
    gameTime = 30;
    timerEl.innerText = gameTime;
    timerHud.style.display = 'block';
    startTimer();
  } else {
    timerHud.style.display = 'none';
  }
}

function startTimer() {
  if (gameTimer) clearInterval(gameTimer);
  
  gameTimer = setInterval(() => {
    gameTime--;
    timerEl.innerText = gameTime;
    
    if (gameTime <= 0) {
      endGame();
    }
  }, 1000);
}

function endGame() {
  gameActive = false;
  clearInterval(gameTimer);
  finalScoreEl.innerText = score;
  gameOverOverlay.style.display = 'flex';
  menuButton.style.display = 'none';
}

function restartGame() {
  gameOverOverlay.style.display = 'none';
  startGame(gameMode);
}

function backToMenu() {
  gameActive = false;
  gameOverOverlay.style.display = 'none';
  menuOverlay.style.display = 'flex';
  menuButton.style.display = 'none';
  timerHud.style.display = 'none';
  clearInterval(gameTimer);
}

// ========================
// CENÁRIO DETALHADO
// ========================
function drawScenario() {
  // céu gradiente
  const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
  gradient.addColorStop(0, "#0f172a");
  gradient.addColorStop(0.7, "#1e293b");
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // nuvens distantes
  ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(150 + i * 200, 80, 40, 0, Math.PI * 2);
    ctx.arc(180 + i * 200, 60, 35, 0, Math.PI * 2);
    ctx.arc(130 + i * 200, 60, 30, 0, Math.PI * 2);
    ctx.fill();
  }

  // chão com textura
  ctx.fillStyle = "#334155";
  ctx.fillRect(0, canvas.height - 120, canvas.width, 120);
  
  // textura do chão (riscos)
  ctx.strokeStyle = "#475569";
  ctx.lineWidth = 2;
  for (let i = 0; i < canvas.width; i += 30) {
    ctx.beginPath();
    ctx.moveTo(i, canvas.height - 120);
    ctx.lineTo(i + 20, canvas.height);
    ctx.strokeStyle = "#475569";
    ctx.stroke();
  }

  // paredes/blocos 3D
  for (let i = 0; i < canvas.width; i += 120) {
    // bloco principal
    ctx.fillStyle = "#64748b";
    ctx.fillRect(i, canvas.height - 200, 80, 80);
    
    // sombra
    ctx.fillStyle = "#475569";
    ctx.fillRect(i + 5, canvas.height - 195, 70, 10);
    
    // detalhes do bloco
    ctx.strokeStyle = "#94a3b8";
    ctx.lineWidth = 2;
    ctx.strokeRect(i + 10, canvas.height - 190, 20, 20);
    ctx.strokeRect(i + 40, canvas.height - 160, 20, 20);
  }

  // postes de luz
  ctx.fillStyle = "#64748b";
  ctx.fillRect(200, canvas.height - 300, 10, 180);
  ctx.fillStyle = "#facc15";
  ctx.beginPath();
  ctx.arc(205, canvas.height - 310, 15, 0, Math.PI * 2);
  ctx.fill();
  
  // segundo poste
  ctx.fillStyle = "#64748b";
  ctx.fillRect(700, canvas.height - 300, 10, 180);
  ctx.fillStyle = "#facc15";
  ctx.beginPath();
  ctx.arc(705, canvas.height - 310, 15, 0, Math.PI * 2);
  ctx.fill();
}

// ========================
// ALVOS MELHORADOS
// ========================
function drawTargets() {
  targets.forEach(t => {
    // círculo externo
    ctx.fillStyle = "#ef4444";
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.r, 0, Math.PI * 2);
    ctx.fill();
    
    // brilho no alvo
    ctx.fillStyle = "#ff6b6b";
    ctx.beginPath();
    ctx.arc(t.x - 3, t.y - 3, t.r - 15, 0, Math.PI * 2);
    ctx.fill();

    // círculo interno
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.r - 8, 0, Math.PI * 2);
    ctx.stroke();
    
    // centro
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(t.x, t.y, 4, 0, Math.PI * 2);
    ctx.fill();
    
    // sombra
    ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 3;
  });
  ctx.shadowColor = "transparent";
}

// ========================
// MIRA
// ========================
function drawCrosshair() {
  if (!gameActive) return;
  
  ctx.strokeStyle = "#22c55e";
  ctx.lineWidth = 2;
  ctx.shadowColor = "#22c55e";
  ctx.shadowBlur = 10;

  // linhas principais
  ctx.beginPath();
  ctx.moveTo(mouseX - 15, mouseY);
  ctx.lineTo(mouseX - 5, mouseY);
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(mouseX + 5, mouseY);
  ctx.lineTo(mouseX + 15, mouseY);
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(mouseX, mouseY - 15);
  ctx.lineTo(mouseX, mouseY - 5);
  ctx.stroke();
  
  ctx.beginPath();
  ctx.moveTo(mouseX, mouseY + 5);
  ctx.lineTo(mouseX, mouseY + 15);
  ctx.stroke();
  
  // círculo central
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 6, 0, Math.PI * 2);
  ctx.strokeStyle = "#22c55e";
  ctx.stroke();
  
  // ponto central
  ctx.fillStyle = "#22c55e";
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 2, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.shadowColor = "transparent";
}

// ========================
// ARMA EM PRIMEIRA PESSOA
// ========================
function drawGun() {
  if (!gameActive) return;
  
  // Posição base da arma (centralizada, apontando para frente)
  const centerX = canvas.width / 2;
  const baseY = canvas.height - 50;
  
  // ANIMAÇÃO DE RECUO (SOMENTE VISUAL)
  const recoil = shooting ? Math.min(shootFrame * 3, 8) : 0;
  const recoilX = shooting ? (Math.sin(shootFrame) * 2) : 0;
  const gunY = baseY + (shooting ? recoil : 0);
  
  // ========== MÃO ESQUERDA (SEGURANDO A PARTE FRONTAL) ==========
  // manga esquerda
  ctx.fillStyle = "#1e40af";
  ctx.fillRect(centerX - 140 + recoilX, gunY - 30, 50, 50);
  
  // braço esquerdo
  ctx.fillStyle = "#fbbf24";
  ctx.fillRect(centerX - 135 + recoilX, gunY - 25, 40, 45);
  
  // mão esquerda (dedos)
  ctx.fillStyle = "#fbbf24";
  ctx.fillRect(centerX - 140 + recoilX, gunY - 35, 25, 25); // dedos superiores
  ctx.fillRect(centerX - 135 + recoilX, gunY + 5, 30, 20); // parte inferior da mão
  
  // ========== MÃO DIREITA (NO GATILHO) ==========
  // manga direita
  ctx.fillStyle = "#1e40af";
  ctx.fillRect(centerX + 70 + recoilX, gunY - 20, 50, 45);
  
  // braço direito
  ctx.fillStyle = "#fbbf24";
  ctx.fillRect(centerX + 75 + recoilX, gunY - 15, 40, 40);
  
  // mão direita (segurando o gatilho)
  ctx.fillStyle = "#fbbf24";
  ctx.fillRect(centerX + 65 + recoilX, gunY - 25, 30, 25); // dedos superiores
  ctx.fillRect(centerX + 70 + recoilX, gunY + 0, 35, 20); // palma
  
  // ========== CORPO DA ARMA (APONTANDO PARA FRENTE) ==========
  // corpo principal (visão em perspectiva)
  ctx.fillStyle = "#2d2d2d";
  ctx.beginPath();
  ctx.moveTo(centerX - 80 + recoilX, gunY - 20);
  ctx.lineTo(centerX + 100 + recoilX, gunY - 20);
  ctx.lineTo(centerX + 80 + recoilX, gunY + 30);
  ctx.lineTo(centerX - 60 + recoilX, gunY + 30);
  ctx.closePath();
  ctx.fill();
  
  // parte superior da arma (ferrolho)
  ctx.fillStyle = "#3b3b3b";
  ctx.fillRect(centerX - 30 + recoilX, gunY - 35, 100, 20);
  
  // mira traseira
  ctx.fillStyle = "#f59e0b";
  ctx.fillRect(centerX - 10 + recoilX, gunY - 45, 15, 15);
  ctx.fillStyle = "#fbbf24";
  ctx.fillRect(centerX - 7 + recoilX, gunY - 42, 9, 9);
  
  // mira dianteira
  ctx.fillStyle = "#f59e0b";
  ctx.fillRect(centerX + 60 + recoilX, gunY - 40, 8, 18);
  
  // cano (visto de frente)
  ctx.fillStyle = "#1a1a1a";
  ctx.fillRect(centerX + 40 + recoilX, gunY - 15, 60, 15);
  
  // carregador
  ctx.fillStyle = "#262626";
  ctx.beginPath();
  ctx.moveTo(centerX - 40 + recoilX, gunY + 30);
  ctx.lineTo(centerX - 20 + recoilX, gunY + 60);
  ctx.lineTo(centerX + 40 + recoilX, gunY + 60);
  ctx.lineTo(centerX + 20 + recoilX, gunY + 30);
  ctx.closePath();
  ctx.fill();
  
  // gatilho e guarda-mato
  ctx.strokeStyle = "#f59e0b";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(centerX - 30 + recoilX, gunY - 5, 12, 0, Math.PI);
  ctx.stroke();
  
  // FLASH DO TIRO
  if (shooting) {
    // flash na boca do cano
    ctx.fillStyle = "#ffaa00";
    ctx.shadowColor = "#ffaa00";
    ctx.shadowBlur = 30;
    ctx.beginPath();
    ctx.moveTo(centerX + 100 + recoilX, gunY - 25);
    ctx.lineTo(centerX + 130 + recoilX, gunY - 35);
    ctx.lineTo(centerX + 140 + recoilX, gunY - 15);
    ctx.lineTo(centerX + 130 + recoilX, gunY + 5);
    ctx.closePath();
    ctx.fill();
    
    ctx.fillStyle = "#ffffff";
    ctx.shadowBlur = 40;
    ctx.beginPath();
    ctx.arc(centerX + 115 + recoilX, gunY - 15, 12, 0, Math.PI * 2);
    ctx.fill();
    
    // partículas de fumaça
    ctx.fillStyle = "rgba(200, 200, 200, 0.3)";
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(centerX + 125 + recoilX, gunY - 25, 8, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.shadowColor = "transparent";
  }
  
  // Detalhes da mão (sombras)
  ctx.fillStyle = "#eab308";
  ctx.globalAlpha = 0.3;
  ctx.fillRect(centerX - 135 + recoilX, gunY - 15, 30, 5);
  ctx.fillRect(centerX + 75 + recoilX, gunY - 5, 30, 5);
  ctx.globalAlpha = 1;
}

// ========================
// LOOP
// ========================
function loop() {
  drawScenario();
  drawTargets();
  drawCrosshair();
  drawGun();
  
  // Atualiza animação de tiro (somente visual)
  if (shooting) {
    shootFrame++;
    if (shootFrame > 6) {
      shooting = false;
    }
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
